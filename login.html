<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — WINX</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            padding: var(--spacing-xl);
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: var(--spacing-2xl);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }
        .auth-logo svg {
            width: 80px;
            height: 80px;
        }
        .auth-title {
            text-align: center;
            margin-bottom: var(--spacing-md);
        }
        .auth-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-xl);
        }
        .auth-divider {
            display: flex;
            align-items: center;
            margin: var(--spacing-lg) 0;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }
        .auth-divider span {
            padding: 0 var(--spacing-md);
        }
        .form-footer {
            text-align: center;
            margin-top: var(--spacing-lg);
            color: var(--text-secondary);
        }
        .form-footer a {
            color: var(--accent-primary);
        }
        .alert {
            margin-bottom: var(--spacing-md);
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="card auth-card animate-fade-in-up">
            <div class="auth-logo">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" stroke="#C8A76A" stroke-width="2" fill="none"/>
                    <circle cx="50" cy="50" r="35" stroke="#C8A76A" stroke-width="1.5" fill="none"/>
                    <text x="50" y="60" text-anchor="middle" fill="#C8A76A" font-size="32" font-family="Cinzel, serif" font-weight="700">W</text>
                </svg>
            </div>
            
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to your WINX account</p>
            
            <div id="loginError"></div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <div class="flex justify-between items-center mb-lg">
                    <label style="display: flex; align-items: center; gap: var(--spacing-sm); color: var(--text-secondary); font-size: 0.875rem;">
                        <input type="checkbox" id="remember">
                        Remember me
                    </label>
                    <a href="forgot-password.html" class="text-gold" style="font-size: 0.875rem;">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                    Sign In
                </button>
            </form>
            
            <div class="auth-divider">
                <span>or</span>
            </div>
            
            <button class="btn btn-secondary btn-lg" style="width: 100%;" onclick="window.location.href='register.html'">
                Create Account
            </button>
            
            <div class="form-footer">
                <p>Don't have an account? <a href="register.html">Sign up</a></p>
            </div>
            
            <!-- Demo credentials -->
            <div class="alert alert-info mt-lg" style="font-size: 0.8rem;">
                <strong>Demo Credentials:</strong><br>
                Email: admin@winx.com / Password: admin123<br>
                Email: creator@winx.com / Password: creator123
            </div>
        </div>
    </div>

    <script src="js/db/database.js"></script>
    <script>
        // Check if already logged in
        if (db.getCurrentUser()) {
            window.location.href = 'index.html';
        }
        
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            
            const result = db.login(email, password);
            
            if (result.success) {
                window.location.href = 'index.html';
            } else {
                errorDiv.innerHTML = `
                    <div class="alert alert-danger">
                        ${escapeHtml(result.error)}
                    </div>
                `;
            }
        }
    </script>
</body>
</html>

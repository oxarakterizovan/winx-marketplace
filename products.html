<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products — WINX</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .products-hero {
            padding: var(--spacing-3xl) 0;
            text-align: center;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: var(--spacing-xl);
            padding: var(--spacing-3xl) 0;
        }
        .product-card-large {
            transition: all var(--transition-base);
        }
        .product-card-large:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-gold);
        }
        .product-banner {
            width: 100%;
            aspect-ratio: 21/9;
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }
        .product-features {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-md);
        }
        .feature-tag {
            padding: var(--spacing-xs) var(--spacing-sm);
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body class="loading">
    <!-- Loading Screen -->
    <div class="loading-screen">
        <div class="loading-logo">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" class="logo-path"/>
                <text x="50" y="58" text-anchor="middle" fill="#C8A76A" font-size="24" font-family="Cinzel, serif" font-weight="700">W</text>
            </svg>
        </div>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        <div class="loading-text">Loading WINX</div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">
                <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="18" stroke="#C8A76A" stroke-width="2" fill="none"/>
                    <text x="20" y="26" text-anchor="middle" fill="#C8A76A" font-size="20" font-family="Cinzel, serif" font-weight="700">W</text>
                </svg>
                WINX
            </a>
            
            <ul class="navbar-menu">
                <li><a href="index.html" class="navbar-link">Home</a></li>
                <li><a href="marketplace.html" class="navbar-link">Marketplace</a></li>
                <li><a href="products.html" class="navbar-link active">Products</a></li>
                <li><a href="forum.html" class="navbar-link">Forum</a></li>
                <li><a href="documentation.html" class="navbar-link">Documentation</a></li>
                <li><a href="support.html" class="navbar-link">Support</a></li>
            </ul>
            
            <div class="navbar-actions">
                <button class="navbar-icon-btn search-btn">🔍</button>
                <button class="navbar-icon-btn notifications-btn">🔔<span class="badge" style="display: none;"></span></button>
                <div class="navbar-auth">
                    <a href="login.html" class="btn btn-secondary btn-sm">Войти</a>
                    <a href="register.html" class="btn btn-primary btn-sm">Регистрация</a>
                </div>
                <div class="mobile-menu-toggle"><span></span><span></span><span></span></div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Products Hero -->
        <section class="products-hero">
            <div class="container">
                <h1 class="mb-md">Our Products</h1>
                <p class="text-secondary" style="max-width: 600px; margin: 0 auto;">
                    Premium Minecraft utilities crafted with precision and care. 
                    Each product is designed to enhance your gaming experience.
                </p>
            </div>
        </section>

        <!-- Products Grid -->
        <section class="products-section">
            <div class="container">
                <div class="products-grid" id="productsGrid">
                    <!-- Products will be loaded here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer" style="background: var(--bg-secondary); border-top: 1px solid var(--border-color); padding: var(--spacing-3xl) 0; margin-top: var(--spacing-3xl);">
        <div class="container">
            <div class="divider divider-gothic mb-xl"></div>
            <div class="text-center">
                <p class="text-secondary" style="font-size: 0.875rem;">
                    &copy; 2024 WINX Platform. All rights reserved.
                </p>
            </div>
        </div>
    </footer>

    <script src="js/db/database.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Load products
        function loadProducts() {
            const products = db.getProducts();
            const grid = document.getElementById('productsGrid');
            
            if (!products || products.length === 0) {
                grid.innerHTML = '<p class="text-center text-secondary">No products available</p>';
                return;
            }
            
            grid.innerHTML = products.map((product, index) => `
                <div class="card product-card-large animate-on-load" style="animation-delay: ${index * 0.1}s;">
                    <div class="product-banner" style="background: ${product.id === 'prod-winxloader' 
                        ? 'linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)' 
                        : 'linear-gradient(135deg, #2d1b4e 0%, #1a1a2e 100%)'};">
                        ${product.id === 'prod-winxloader' ? '⚡' : '🖱️'}
                    </div>
                    <div class="card-badge card-badge-free">${product.price === 0 ? 'Free' : '$' + product.price}</div>
                    <h3 class="mb-sm">${escapeHtml(product.name)}</h3>
                    <p class="text-secondary mb-md" style="font-size: 0.9rem;">${escapeHtml(product.description)}</p>
                    
                    <div class="flex justify-between items-center mb-md">
                        <div class="rating">
                            ${getStars(product.rating)}
                            <span class="rating-value">(${formatNumber(product.reviewsCount)})</span>
                        </div>
                        <span class="text-gold" style="font-weight: 600;">${formatNumber(product.downloads)} downloads</span>
                    </div>
                    
                    <div class="product-features">
                        ${product.features.slice(0, 4).map(f => `<span class="feature-tag">${escapeHtml(f)}</span>`).join('')}
                    </div>
                    
                    <div class="mt-lg">
                        <a href="product-${product.slug}.html" class="btn btn-primary" style="width: 100%;">View Details</a>
                    </div>
                </div>
            `).join('');
        }
        
        function getStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                stars += i <= Math.round(rating) ? '<span class="rating-star">★</span>' : '<span class="rating-star empty">☆</span>';
            }
            return stars;
        }
        
        loadProducts();
    </script>
</body>
</html>
